[remote.github]
owner = "BQmaaDNA"
repo = "MDNA"
#自用时换成自己的仓库owner和repo
#注意，本地git user需与github一致才能实现成功@
[changelog]
# 标题
header = """
# 更新日志
"""

body = """
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{% macro print_commit(commit) -%}
    - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
        {% if commit.breaking %}[**breaking**] {% endif %}\
        {{ commit.message | split(pat="\n") | first | upper_first }} \
        @{{ commit.author.name }}
        {%- if commit.footers -%}
            {%- for footer in commit.footers -%}
                {%- if footer.token == "Co-authored-by" -%}
                    {%- set co_author_name = footer.value | split(pat=" <") | first | trim %} @{{ co_author_name }}
                {%- endif -%}
            {%- endfor -%}
        {%- endif %}
{% endmacro -%}

{% if version %}\
    ## {{ version | trim_start_matches(pat="v") }} ({{ timestamp | date(format="%Y-%m-%d") }})
{% else %}\
    ## 未发布
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits
    | filter(attribute="scope")
    | sort(attribute="scope") %}
        {{ self::print_commit(commit=commit) }}
    {%- endfor %}
    {% for commit in commits %}
        {%- if not commit.scope -%}
            {{ self::print_commit(commit=commit) }}
        {% endif -%}
    {% endfor -%}
{% endfor -%}
{%- if github -%}
{% if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 %}
  ## 新贡献者 ❤️
{% endif %}\
{% for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
  * @{{ contributor.username }} made their first contribution
    {%- if contributor.pr_number %} in \
      [#{{ contributor.pr_number }}]({{ self::remote_url() }}/pull/{{ contributor.pr_number }}) \
    {%- endif %}
{%- endfor -%}
{%- endif %}
"""

# 尾部
footer = """
"""

[git]
# 过滤提交
conventional_commits = true # 使用约定式提交格式
filter_unconventional = false # 不过滤非约定式提交
# 启用完整的 commit 信息
split_commits = false
# 保留完整的 commit body
protect_breaking_commits = false
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->新功能 | Features" },
    { message = "^fix", group = "<!-- 1 -->问题修复 | Bug Fixes" },
    { message = "^(refactor|rft)", group = "<!-- 2 -->代码重构 | Refactoring" },
    { message = "^improve", group = "<!-- 3 -->代码优化 | Code Optimization" },
    { message = "^reorg", group = "<!-- 14 -->结构优化 | Project Structure" },
    { message = "^perf", group = "<!-- 4 -->性能优化 | Performance" },
    { message = "^docs", group = "<!-- 5 -->文档 | Documentation" },
    { message = "^(style|styles)", group = "<!-- 6 -->样式 | Style" },
    { message = "^test", group = "<!-- 7 -->测试 | Tests" },
    { message = "^ci", group = "<!-- 8 -->持续集成 | Continuous Integration" },
    { message = "^chore\\(deps\\)", group = "<!-- 9 -->依赖更新 | Dependencies" },
    { message = "^chore", group = "<!-- 10 -->日常维护 | Maintenance" },
    { body = ".*security", group = "<!-- 11 -->安全 | Security" },
    { message = "^wip", group = "<!-- 12 -->暂存 | WIP" },
    { message = "^[Rr]evert", group = "<!-- 13 -->撤销 | Reverts" },
]

# 忽略这些提交
ignore_tags = "rc"

# 排序规则
sort_commits = "oldest"

# 启用GitHub集成
[git.github]
commits = true